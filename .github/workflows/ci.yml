name: CI

on:
  push:
    branches: [main, next]
  pull_request:
    branches: [main, next]

jobs:
  ci:
    name: Typecheck & Build
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x, 23.x, 24.x]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck (fono)
        run: npm run typecheck --workspace=packages/fono

      - name: Build (fono)
        run: npm run build --workspace=packages/fono

      - name: Typecheck (create-fono)
        run: npm run typecheck --workspace=packages/create-fono

      - name: Build (create-fono)
        run: npm run build --workspace=packages/create-fono

  # Scaffold smoke test: run create-fono in CI mode, verify files exist
  scaffold-test:
    name: Scaffold smoke test
    runs-on: ubuntu-latest
    needs: ci

    strategy:
      matrix:
        template: [minimal, full]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm

      - name: Install & build packages
        run: npm ci && npm run build

      - name: Scaffold ${{ matrix.template }} template
        run: |
          node packages/create-fono/dist/index.js test-app \
            --ci \
            --runtime node \
            --template ${{ matrix.template }} \
            --pkg-manager npm \
            --no-install \
            --no-git

      - name: Verify common scaffold files
        run: |
          test -f test-app/server.ts        && echo "✓ server.ts"
          test -f test-app/client.ts        && echo "✓ client.ts"
          test -f test-app/tsconfig.json    && echo "✓ tsconfig.json"
          test -f test-app/vite.config.ts   && echo "✓ vite.config.ts"
          test -f test-app/package.json     && echo "✓ package.json"
          test -f test-app/app/layouts.tsx  && echo "✓ app/layouts.tsx"
          test -f test-app/app/routes/home.tsx  && echo "✓ app/routes/home.tsx"
          test -f test-app/app/routes/about.tsx && echo "✓ app/routes/about.tsx"
          test -f test-app/app/routes/api.ts    && echo "✓ app/routes/api.ts"

      - name: Verify full template extras
        if: matrix.template == 'full'
        run: |
          test -f test-app/app/store.ts                         && echo "✓ store.ts"
          test -f test-app/app/routes/counter.tsx               && echo "✓ counter.tsx"
          test -f test-app/app/routes/posts/index.tsx           && echo "✓ posts/index.tsx"
          test -f "test-app/app/routes/posts/[slug].tsx"        && echo "✓ posts/[slug].tsx"

      - name: Verify tsconfig in scaffolded app
        run: |
          node -e "
            const t = JSON.parse(require('fs').readFileSync('test-app/tsconfig.json','utf8'))
            const co = t.compilerOptions
            if (co.jsxImportSource !== 'hono/jsx') throw new Error('jsxImportSource wrong: ' + co.jsxImportSource)
            if (!co.strict) throw new Error('strict not enabled')
            if (!co.allowImportingTsExtensions) throw new Error('allowImportingTsExtensions missing')
            console.log('tsconfig valid ✓')
          "

      - name: Verify package.json in scaffolded app
        run: |
          node -e "
            const p = JSON.parse(require('fs').readFileSync('test-app/package.json','utf8'))
            if (!p.dependencies['@mdakashdeveloper/fono']) throw new Error('fono dep missing')
            if (!p.scripts.build) throw new Error('build script missing')
            if (!p.scripts.typecheck) throw new Error('typecheck script missing')
            console.log('package.json valid ✓')
          "